<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>源石电路求解器 - Circuit Solver</title>
<meta name="description" content="交互式电路拼图求解器，支持双色原件、禁用格子、行列双色约束">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f1a; color: #c0c0e0;
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    font-size: 14px; min-height: 100vh;
    display: flex; flex-direction: column;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    background: #13132a; border-bottom: 1px solid #2a2a4a;
    padding: 8px 16px; display: flex; align-items: center;
    gap: 10px; user-select: none; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; color: #7ca8ff; letter-spacing: 1px; font-weight: 600; }
  header .subtitle { color: #555580; font-size: 12px; }
  header .back-link {
    margin-left: auto; color: #7ca8ff; text-decoration: none; font-size: 13px;
    padding: 4px 12px; border: 1px solid #333366; border-radius: 4px;
  }

  .mode-toggle {
    display: flex; gap: 0; border: 1px solid #333366; border-radius: 6px; overflow: hidden;
  }
  .mode-toggle button {
    border: none; border-radius: 0; padding: 5px 12px; font-size: 13px;
    background: #1a1a2e; color: #7070a0; cursor: pointer;
  }
  .mode-toggle button.active { background: #2a2a50; color: #c0c0ff; font-weight: bold; }
  .mode-toggle button:hover:not(.active) { background: #222240; }

  /* ── Layout ── */
  .main-layout {
    display: flex; flex: 1; gap: 0; overflow: hidden; height: calc(100vh - 50px);
  }
  .left-panel {
    display: flex; flex-direction: column; gap: 8px; padding: 10px 12px;
    width: 600px; min-width: 360px; border-right: 1px solid #1e1e38; overflow-y: auto;
  }
  .right-panel {
    flex: 1; display: flex; flex-direction: column; padding: 10px 12px; gap: 8px; overflow: hidden;
  }

  .section {
    background: #13132a; border: 1px solid #1e1e3a; border-radius: 8px; padding: 8px 10px;
  }
  .section-title {
    font-size: 11px; color: #5555aa; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; font-weight: 600;
  }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .row label { color: #8080b0; white-space: nowrap; }

  input[type=number] {
    background: #1a1a2e; color: #c0c0e0; border: 1px solid #333366;
    border-radius: 4px; padding: 4px 2px; width: 40px;
    text-align: center; font-size: 13px; outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
  input[type=number]:focus { border-color: #5555cc; }

  button {
    background: #1a1a2e; color: #c0c0e0; border: 1px solid #333366;
    border-radius: 5px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    transition: background .15s, border-color .15s; white-space: nowrap;
    touch-action: manipulation;
  }
  button:hover { background: #222244; border-color: #5555aa; }
  button:active { background: #111133; }
  button:disabled { color: #444466; border-color: #222233; cursor: not-allowed; }

  .btn-primary {
    background: #1a3a1a; color: #4CAF50; border: 2px solid #4CAF50;
    font-weight: bold; font-size: 14px; padding: 8px 20px;
  }
  .btn-primary:hover { background: #224422; border-color: #66cc66; }
  .btn-primary:disabled { background: #111; color: #555; border-color: #333; }

  /* ── Grid area with inline constraint inputs ── */
  .grid-area {
    display: flex; flex-direction: column; align-items: flex-start;
    overflow: auto; flex: 1; min-height: 180px;
    padding: 4px;
  }
  .grid-wrapper {
    display: inline-grid; gap: 0; align-items: stretch;
  }
  .grid-wrapper input[type=number] {
    width: 100%; min-width: 0; padding: 2px 0; font-size: 11px;
    height: 100%; border-radius: 3px;
  }
  .grid-wrapper .cnt-green { background: #0e1a0e; }
  .grid-wrapper .cnt-blue  { background: #0e0e1a; }
  .grid-wrapper .corner-cell {
    display: flex; align-items: center; justify-content: center;
    color: #333355; font-size: 10px;
  }
  .grid-wrapper .col-hdr {
    display: flex; flex-direction: column; gap: 1px;
    align-items: stretch; justify-content: flex-end;
  }
  .grid-wrapper .row-hdr {
    display: flex; flex-direction: row; gap: 1px;
    align-items: stretch; justify-content: flex-end;
  }

  canvas#gridCanvas {
    image-rendering: pixelated; cursor: crosshair;
    display: block; touch-action: none;
  }

  .grid-edit-bar {
    display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7070a0;
  }
  .grid-edit-bar .active-tool {
    padding: 4px 10px; border-radius: 4px; border: 1px solid #333366;
    font-size: 12px; cursor: pointer; background: #1a1a2e;
  }
  .grid-edit-bar .active-tool.sel { background: #2a2050; border-color: #9955ff; color: #cc88ff; }

  #statusBar {
    text-align: center; font-size: 13px; color: #5555aa;
    padding: 2px 0; min-height: 22px; font-weight: 500;
  }
  #statusBar.ok  { color: #4CAF50; }
  #statusBar.err { color: #F44336; }

  /* ── Piece panel ── */
  .piece-list-header {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
  }
  .piece-list-header span { flex: 1; color: #8080b0; font-size: 12px; min-width: 120px; }
  .piece-add-btns { display: flex; gap: 6px; }
  .btn-add-green {
    background: #1a3a1a; color: #4CAF50; border: 1px solid #3a7a3a;
    font-size: 13px; padding: 5px 10px;
  }
  .btn-add-green:hover { background: #234a23; border-color: #4CAF50; }
  .btn-add-blue {
    background: #1a1a3a; color: #5599ff; border: 1px solid #2a3a7a;
    font-size: 13px; padding: 5px 10px;
  }
  .btn-add-blue:hover { background: #22224a; border-color: #5599ff; }

  .piece-list {
    display: flex; flex-wrap: wrap; gap: 10px;
    overflow-y: auto; flex: 1; align-content: flex-start;
  }
  .piece-card {
    border: 2px solid #333; border-radius: 7px; padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; width: 164px; background: #111120;
  }
  .piece-card .piece-name { font-size: 12px; font-weight: bold; }
  canvas.piece-canvas { cursor: crosshair; display: block; image-rendering: pixelated; touch-action: none; }
  .piece-card button {
    width: 100%; padding: 4px 0; font-size: 12px; border-color: #333; color: #888;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f0f1a; }
  ::-webkit-scrollbar-thumb { background: #333366; border-radius: 4px; }

  /* ══ Responsive: Tablet ══ */
  @media (max-width: 1024px) {
    .left-panel { width: 50%; min-width: 320px; }
    .piece-card { width: 150px; }
  }

  /* ══ Responsive: Mobile ══ */
  @media (max-width: 768px) {
    header { padding: 8px 10px; gap: 6px; }
    header h1 { font-size: 15px; }
    header .subtitle { display: none; }
    .mode-toggle button { padding: 5px 10px; font-size: 12px; }

    .main-layout {
      flex-direction: column; height: auto; overflow-y: auto;
      min-height: 100vh;
    }
    .left-panel {
      width: 100%; min-width: 0; border-right: none;
      border-bottom: 1px solid #1e1e38; overflow-y: visible;
    }
    .right-panel {
      overflow-y: auto; min-height: 300px;
    }
    .grid-area { min-height: 120px; }
    .piece-card { width: 145px; }
    .piece-list-header span { font-size: 11px; }
    button { padding: 7px 10px; }
    .btn-primary { padding: 10px 16px; font-size: 15px; }
  }

  @media (max-width: 480px) {
    header { flex-wrap: wrap; }
    header .back-link { font-size: 12px; padding: 3px 8px; }
    .section { padding: 6px 8px; }
    .piece-card { width: 130px; }
    canvas.piece-canvas { width: 120px !important; height: 120px !important; }
  }
</style>
</head>
<body>

<header>
  <h1>源石电路求解器</h1>
  <span class="subtitle">CircuitSolver</span>
  <div class="mode-toggle">
    <button id="btnModeGreen" class="active" onclick="setMode('green')">🟢 纯绿模式</button>
    <button id="btnModeDual"  onclick="setMode('dual')">🔵 双色模式</button>
  </div>
  <a href="../" class="back-link">← 返回主页</a>
</header>

<div class="main-layout">
  <div class="left-panel">

    <!-- Grid size + tools -->
    <div class="section">
      <div class="row">
        <label>行</label>
        <input type="number" id="inpRows" min="1" max="20" value="5">
        <label>列</label>
        <input type="number" id="inpCols" min="1" max="20" value="5">
        <button onclick="applySize()">应用</button>
        <div class="grid-edit-bar" style="margin-left:auto;">
          <button class="active-tool sel" id="toolDisabled" onclick="setGridEditMode('disabled')">✏ 禁用格</button>
          <button class="active-tool" id="toolGreen" onclick="setGridEditMode('green')">🟢 预放绿</button>
          <button class="active-tool" id="toolBlue" onclick="setGridEditMode('blue')" style="display:none;">🔵 预放蓝</button>
        </div>
      </div>
    </div>

    <!-- Grid + inline constraints -->
    <div class="section" style="flex:1;display:flex;flex-direction:column;min-height:200px;">
      <div class="section-title" id="gridSectionTitle">求解网格（约束数字输入在网格旁边）</div>
      <div class="grid-area" id="gridArea">
        <!-- grid-wrapper built by JS -->
      </div>
    </div>

    <!-- Actions -->
    <div class="row" style="gap:6px;">
      <button class="btn-primary" id="btnSolve" onclick="startSolve()">▶ 开始求解</button>
      <button onclick="clearSolution()">清除结果</button>
      <button onclick="clearDisabled()" style="color:#ff9944;border-color:#664422;">清除禁用</button>
      <button onclick="clearPrePlaced()" style="color:#ff9944;border-color:#664422;">清除预放</button>
    </div>
    <div id="statusBar"></div>
  </div>

  <!-- Right: Piece editors -->
  <div class="right-panel">
    <div class="piece-list-header">
      <span>原件列表（绘制形状 · 可旋转 · 不可翻转）</span>
      <div class="piece-add-btns">
        <button class="btn-add-green" onclick="addPiece('green')">＋ 绿色原件</button>
        <button class="btn-add-blue" id="btnAddBlue" onclick="addPiece('blue')">＋ 蓝色原件</button>
      </div>
      <button onclick="removePiece()" style="color:#cc4444;border-color:#442222;">－ 删除末位</button>
    </div>
    <div class="piece-list" id="pieceList"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════════
const CELL = 36;
const PCELL = 28;
const PIECE_GRID = 5;

const GREEN_SHADES = [
  '#4CAF50','#66BB6A','#388E3C','#81C784','#2E7D32',
  '#A5D6A7','#1B5E20','#C8E6C9','#43A047','#00C853',
];
const BLUE_SHADES = [
  '#2196F3','#42A5F5','#1565C0','#64B5F6','#0D47A1',
  '#90CAF9','#1976D2','#BBDEFB','#1E88E5','#2979FF',
];

// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
let mode = 'green';
let gridRows = 5, gridCols = 5;
let rowConstraints = Array.from({length:5}, () => ({green:0, blue:0}));
let colConstraints = Array.from({length:5}, () => ({green:0, blue:0}));
let disabledCells = new Set();
let prePlacedCells = new Map(); // key: 'r,c', value: 'green' | 'blue'
let solution = null;
let pieces = [];
let pieceSerial = 0;
let greenCount = 0, blueCount = 0;
let gridEditMode = 'none'; // 'none' | 'disabled' | 'green' | 'blue'

// DOM refs for inline constraint inputs (filled by buildGridWrapper)
let _rowInputsG = [], _rowInputsB = [];
let _colInputsG = [], _colInputsB = [];

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  applySize();
  setMode('green');
});

// ═══════════════════════════════════════════════════════════
// Mode switching
// ═══════════════════════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('btnModeGreen').classList.toggle('active', m === 'green');
  document.getElementById('btnModeDual').classList.toggle('active', m === 'dual');
  document.getElementById('btnAddBlue').style.display = m === 'dual' ? '' : 'none';
  document.getElementById('toolBlue').style.display = m === 'dual' ? '' : 'none';
  document.getElementById('gridSectionTitle').textContent =
    m === 'green' ? '求解网格（绿色约束在网格旁）' : '求解网格（绿/蓝约束在网格旁）';
  if (gridEditMode === 'blue' && m === 'green') setGridEditMode('disabled');
  buildGridWrapper();
  solution = null;
  setStatus('', '');
  drawGrid();
}

function setGridEditMode(newMode) {
  // Toggle: if clicking the same mode, turn off editing
  if (gridEditMode === newMode) {
    gridEditMode = 'none';
  } else {
    gridEditMode = newMode;
  }
  
  document.getElementById('toolDisabled').classList.toggle('sel', gridEditMode === 'disabled');
  document.getElementById('toolGreen').classList.toggle('sel', gridEditMode === 'green');
  document.getElementById('toolBlue').classList.toggle('sel', gridEditMode === 'blue');
}

// ═══════════════════════════════════════════════════════════
// Grid size
// ═══════════════════════════════════════════════════════════
function applySize() {
  gridRows = Math.max(1, Math.min(20, parseInt(document.getElementById('inpRows').value) || 5));
  gridCols = Math.max(1, Math.min(20, parseInt(document.getElementById('inpCols').value) || 5));
  document.getElementById('inpRows').value = gridRows;
  document.getElementById('inpCols').value = gridCols;
  rowConstraints = Array.from({length: gridRows}, (_, i) => ({
    green: (rowConstraints[i]||{}).green||0, blue: (rowConstraints[i]||{}).blue||0,
  }));
  colConstraints = Array.from({length: gridCols}, (_, j) => ({
    green: (colConstraints[j]||{}).green||0, blue: (colConstraints[j]||{}).blue||0,
  }));
  for (const k of [...disabledCells]) {
    const [r,c] = k.split(',').map(Number);
    if (r >= gridRows || c >= gridCols) disabledCells.delete(k);
  }
  for (const k of [...prePlacedCells.keys()]) {
    const [r,c] = k.split(',').map(Number);
    if (r >= gridRows || c >= gridCols) prePlacedCells.delete(k);
  }
  buildGridWrapper();
  solution = null;
  setStatus('', '');
  drawGrid();
}

// ═══════════════════════════════════════════════════════════
// Build grid wrapper: constraint inputs + canvas in CSS grid
// ═══════════════════════════════════════════════════════════
function buildGridWrapper() {
  const area = document.getElementById('gridArea');
  area.innerHTML = '';
  _rowInputsG = []; _rowInputsB = [];
  _colInputsG = []; _colInputsB = [];

  const hdrCols = mode === 'dual' ? 2 : 1; // number of input columns on the left for row constraints
  // CSS grid: [hdrCols input cols] [gridCols * CELL canvas]
  //           top: [hdrCols corner] [gridCols col-header inputs]
  //           rows: [hdrCols row inputs] [canvas spanning gridCols]
  const wrapper = document.createElement('div');
  wrapper.className = 'grid-wrapper';
  // grid-template-columns: hdrCols * 40px, then 1fr for canvas
  const colTemplate = `repeat(${hdrCols}, 38px) ${gridCols * CELL}px`;
  const rowHdrH = mode === 'dual' ? 36 : 22;
  const rowTemplate = `${rowHdrH}px ${gridRows * CELL}px`;
  wrapper.style.gridTemplateColumns = colTemplate;
  wrapper.style.gridTemplateRows = rowTemplate;

  // ── Corner cell(s) ──
  for (let h = 0; h < hdrCols; h++) {
    const corner = document.createElement('div');
    corner.className = 'corner-cell';
    if (h === 0) corner.textContent = mode === 'dual' ? '🟢' : '';
    else corner.textContent = '🔵';
    corner.style.gridRow = '1'; corner.style.gridColumn = `${h+1}`;
    wrapper.appendChild(corner);
  }

  // ── Column header inputs (top row, spanning over canvas columns) ──
  const colHdrContainer = document.createElement('div');
  colHdrContainer.style.gridRow = '1';
  colHdrContainer.style.gridColumn = `${hdrCols+1}`;
  colHdrContainer.style.display = 'flex';
  colHdrContainer.style.flexDirection = 'row';
  colHdrContainer.style.gap = '0';
  for (let c = 0; c < gridCols; c++) {
    const col = document.createElement('div');
    col.className = 'col-hdr';
    col.style.width = CELL + 'px';
    // Green
    const ig = document.createElement('input');
    ig.type = 'number'; ig.min = 0; ig.max = gridRows;
    ig.value = colConstraints[c].green;
    ig.className = 'cnt-green';
    ig.title = `第${c+1}列 绿色`;
    ig.addEventListener('change', () => { colConstraints[c].green = parseInt(ig.value)||0; });
    _colInputsG.push(ig);
    col.appendChild(ig);
    if (mode === 'dual') {
      const ib = document.createElement('input');
      ib.type = 'number'; ib.min = 0; ib.max = gridRows;
      ib.value = colConstraints[c].blue;
      ib.className = 'cnt-blue';
      ib.title = `第${c+1}列 蓝色`;
      ib.addEventListener('change', () => { colConstraints[c].blue = parseInt(ib.value)||0; });
      _colInputsB.push(ib);
      col.appendChild(ib);
    }
    colHdrContainer.appendChild(col);
  }
  wrapper.appendChild(colHdrContainer);

  // ── Row header inputs (left side, row 2) ──
  for (let h = 0; h < hdrCols; h++) {
    const rowHdrContainer = document.createElement('div');
    rowHdrContainer.style.gridRow = '2';
    rowHdrContainer.style.gridColumn = `${h+1}`;
    rowHdrContainer.style.display = 'flex';
    rowHdrContainer.style.flexDirection = 'column';
    rowHdrContainer.style.gap = '0';
    for (let r = 0; r < gridRows; r++) {
      const cell = document.createElement('div');
      cell.style.height = CELL + 'px';
      cell.style.display = 'flex';
      cell.style.alignItems = 'center';
      if (h === 0) {
        const ig = document.createElement('input');
        ig.type = 'number'; ig.min = 0; ig.max = gridCols;
        ig.value = rowConstraints[r].green;
        ig.className = 'cnt-green';
        ig.title = `第${r+1}行 绿色`;
        ig.addEventListener('change', () => { rowConstraints[r].green = parseInt(ig.value)||0; });
        _rowInputsG.push(ig);
        cell.appendChild(ig);
      } else {
        const ib = document.createElement('input');
        ib.type = 'number'; ib.min = 0; ib.max = gridCols;
        ib.value = rowConstraints[r].blue;
        ib.className = 'cnt-blue';
        ib.title = `第${r+1}行 蓝色`;
        ib.addEventListener('change', () => { rowConstraints[r].blue = parseInt(ib.value)||0; });
        _rowInputsB.push(ib);
        cell.appendChild(ib);
      }
      rowHdrContainer.appendChild(cell);
    }
    wrapper.appendChild(rowHdrContainer);
  }

  // ── Canvas (row 2, last column) ──
  const canvas = document.createElement('canvas');
  canvas.id = 'gridCanvas';
  canvas.style.gridRow = '2';
  canvas.style.gridColumn = `${hdrCols+1}`;
  wrapper.appendChild(canvas);

  area.appendChild(wrapper);
  setupGridCanvas();
}

// ═══════════════════════════════════════════════════════════
// Read constraints from inline inputs
// ═══════════════════════════════════════════════════════════
function readConstraints() {
  _rowInputsG.forEach((el,i) => { rowConstraints[i].green = parseInt(el.value)||0; });
  _rowInputsB.forEach((el,i) => { rowConstraints[i].blue  = parseInt(el.value)||0; });
  _colInputsG.forEach((el,i) => { colConstraints[i].green = parseInt(el.value)||0; });
  _colInputsB.forEach((el,i) => { colConstraints[i].blue  = parseInt(el.value)||0; });
}

// ═══════════════════════════════════════════════════════════
// Grid canvas interaction (disabled cells + touch)
// ═══════════════════════════════════════════════════════════
function setupGridCanvas() {
  const canvas = document.getElementById('gridCanvas');
  if (!canvas) return;
  // Mouse
  canvas.addEventListener('mousedown', onGridMouseDown);
  canvas.addEventListener('mousemove', onGridMouseMove);
  canvas.addEventListener('mouseup', () => { _gridDragging = false; });
  canvas.addEventListener('mouseleave', () => { _gridDragging = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  // Touch
  canvas.addEventListener('touchstart', onGridTouchStart, {passive:false});
  canvas.addEventListener('touchmove', onGridTouchMove, {passive:false});
  canvas.addEventListener('touchend', () => { _gridDragging = false; });
}

let _gridDragging = false;
let _gridDragAction = null;

function gridCanvasCell(clientX, clientY) {
  const canvas = document.getElementById('gridCanvas');
  if (!canvas) return [-1,-1];
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  if (x < 0 || y < 0) return [-1,-1];
  const c = Math.floor(x / CELL);
  const r = Math.floor(y / CELL);
  if (r < 0 || r >= gridRows || c < 0 || c >= gridCols) return [-1,-1];
  return [r,c];
}

function onGridMouseDown(e) {
  if (gridEditMode === 'none') return; // Editing disabled
  e.preventDefault();
  _gridDragging = true;
  const [r,c] = gridCanvasCell(e.clientX, e.clientY);
  if (r < 0) return;
  const key = `${r},${c}`;
  
  if (gridEditMode === 'disabled') {
    if (e.button === 2) {
      _gridDragAction = 'clear'; 
      disabledCells.delete(key);
      prePlacedCells.delete(key);
    } else {
      _gridDragAction = disabledCells.has(key) ? 'clear' : 'disabled';
      if (_gridDragAction === 'disabled') {
        disabledCells.add(key);
        prePlacedCells.delete(key);
      } else {
        disabledCells.delete(key);
      }
    }
  } else if (gridEditMode === 'green') {
    if (e.button === 2) {
      _gridDragAction = 'clear';
      prePlacedCells.delete(key);
    } else {
      _gridDragAction = prePlacedCells.get(key) === 'green' ? 'clear' : 'green';
      if (_gridDragAction === 'green') {
        disabledCells.delete(key);
        prePlacedCells.set(key, 'green');
      } else {
        prePlacedCells.delete(key);
      }
    }
  } else if (gridEditMode === 'blue') {
    if (e.button === 2) {
      _gridDragAction = 'clear';
      prePlacedCells.delete(key);
    } else {
      _gridDragAction = prePlacedCells.get(key) === 'blue' ? 'clear' : 'blue';
      if (_gridDragAction === 'blue') {
        disabledCells.delete(key);
        prePlacedCells.set(key, 'blue');
      } else {
        prePlacedCells.delete(key);
      }
    }
  }
  solution = null; setStatus('', ''); drawGrid();
}
function onGridMouseMove(e) {
  if (!_gridDragging || gridEditMode === 'none') return;
  const [r,c] = gridCanvasCell(e.clientX, e.clientY);
  if (r < 0) return;
  const key = `${r},${c}`;
  
  if (_gridDragAction === 'disabled') {
    disabledCells.add(key);
    prePlacedCells.delete(key);
  } else if (_gridDragAction === 'green') {
    disabledCells.delete(key);
    prePlacedCells.set(key, 'green');
  } else if (_gridDragAction === 'blue') {
    disabledCells.delete(key);
    prePlacedCells.set(key, 'blue');
  } else if (_gridDragAction === 'clear') {
    disabledCells.delete(key);
    prePlacedCells.delete(key);
  }
  solution = null; setStatus('', ''); drawGrid();
}

function onGridTouchStart(e) {
  if (gridEditMode === 'none') return; // Editing disabled
  e.preventDefault();
  _gridDragging = true;
  const t = e.touches[0];
  const [r,c] = gridCanvasCell(t.clientX, t.clientY);
  if (r < 0) return;
  const key = `${r},${c}`;
  
  if (gridEditMode === 'disabled') {
    _gridDragAction = disabledCells.has(key) ? 'clear' : 'disabled';
    if (_gridDragAction === 'disabled') {
      disabledCells.add(key);
      prePlacedCells.delete(key);
    } else {
      disabledCells.delete(key);
    }
  } else if (gridEditMode === 'green') {
    _gridDragAction = prePlacedCells.get(key) === 'green' ? 'clear' : 'green';
    if (_gridDragAction === 'green') {
      disabledCells.delete(key);
      prePlacedCells.set(key, 'green');
    } else {
      prePlacedCells.delete(key);
    }
  } else if (gridEditMode === 'blue') {
    _gridDragAction = prePlacedCells.get(key) === 'blue' ? 'clear' : 'blue';
    if (_gridDragAction === 'blue') {
      disabledCells.delete(key);
      prePlacedCells.set(key, 'blue');
    } else {
      prePlacedCells.delete(key);
    }
  }
  solution = null; setStatus('', ''); drawGrid();
}
function onGridTouchMove(e) {
  if (!_gridDragging || gridEditMode === 'none') return;
  e.preventDefault();
  const t = e.touches[0];
  const [r,c] = gridCanvasCell(t.clientX, t.clientY);
  if (r < 0) return;
  const key = `${r},${c}`;
  
  if (_gridDragAction === 'disabled') {
    disabledCells.add(key);
    prePlacedCells.delete(key);
  } else if (_gridDragAction === 'green') {
    disabledCells.delete(key);
    prePlacedCells.set(key, 'green');
  } else if (_gridDragAction === 'blue') {
    disabledCells.delete(key);
    prePlacedCells.set(key, 'blue');
  } else if (_gridDragAction === 'clear') {
    disabledCells.delete(key);
    prePlacedCells.delete(key);
  }
  solution = null; setStatus('', ''); drawGrid();
}

function clearDisabled() {
  disabledCells.clear(); solution = null; setStatus('', ''); drawGrid();
}

function clearPrePlaced() {
  prePlacedCells.clear(); solution = null; setStatus('', ''); drawGrid();
}

// ═══════════════════════════════════════════════════════════
// Drawing — grid canvas (no margin, canvas = exact grid size)
// ═══════════════════════════════════════════════════════════
function pieceColor(piece) {
  if (piece.type === 'blue') return BLUE_SHADES[piece.colorIdx % BLUE_SHADES.length];
  return GREEN_SHADES[piece.colorIdx % GREEN_SHADES.length];
}

function pieceLabelNum(piece) {
  return piece.colorIdx + 1;
}

function drawGrid() {
  const canvas = document.getElementById('gridCanvas');
  if (!canvas) return;
  canvas.width  = gridCols * CELL;
  canvas.height = gridRows * CELL;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Cells ──
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      const x = c * CELL, y = r * CELL;
      const key = `${r},${c}`;

      // Check for pre-placed cells first (shown even without solution)
      const prePlaced = prePlacedCells.get(key);
      if (prePlaced && !solution) {
        const color = prePlaced === 'green' ? '#2d5a2d' : '#1e3a6e';
        ctx.fillStyle = color;
        ctx.fillRect(x+1, y+1, CELL-1, CELL-1);
        ctx.strokeStyle = prePlaced === 'green' ? '#4CAF50' : '#5599ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+.5, y+.5, CELL, CELL);
        // Draw "固定" label
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillText('固定', x + CELL/2 + 1, y + CELL/2 + 1);
        ctx.fillStyle = prePlaced === 'green' ? '#88ff88' : '#aaccff';
        ctx.fillText('固定', x + CELL/2, y + CELL/2);
        continue;
      }

      if (disabledCells.has(key) && !solution) {
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 1;
        ctx.strokeRect(x+.5, y+.5, CELL, CELL);
        ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x+4,y+4); ctx.lineTo(x+CELL-4,y+CELL-4);
        ctx.moveTo(x+CELL-4,y+4); ctx.lineTo(x+4,y+CELL-4);
        ctx.stroke();
        continue;
      }

      const cell = solution ? solution[r][c] : null;
      if (cell === 'X') {
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 1;
        ctx.strokeRect(x+.5, y+.5, CELL, CELL);
        ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x+4,y+4); ctx.lineTo(x+CELL-4,y+CELL-4);
        ctx.moveTo(x+CELL-4,y+4); ctx.lineTo(x+4,y+CELL-4);
        ctx.stroke();
      } else if (cell) {
        // Check if this is a pre-placed cell
        if (cell.prePlaced) {
          const color = cell.type === 'green' ? '#2d5a2d' : '#1e3a6e';
          ctx.fillStyle = color;
          ctx.fillRect(x+1, y+1, CELL-1, CELL-1);
          ctx.strokeStyle = cell.type === 'green' ? '#4CAF50' : '#5599ff';
          ctx.lineWidth = 2;
          ctx.strokeRect(x+.5, y+.5, CELL, CELL);
          // Draw "固定" label
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillText('固定', x + CELL/2 + 1, y + CELL/2 + 1);
          ctx.fillStyle = cell.type === 'green' ? '#88ff88' : '#aaccff';
          ctx.fillText('固定', x + CELL/2, y + CELL/2);
        } else {
          const piece = pieces[cell.pieceIdx];
          const color = pieceColor(piece);
          ctx.fillStyle = color;
          ctx.fillRect(x+1, y+1, CELL-1, CELL-1);
          ctx.strokeStyle = shadeColor(color, -40);
          ctx.lineWidth = 1;
          ctx.strokeRect(x+.5, y+.5, CELL, CELL);
          // ── Draw piece index number ──
          const num = pieceLabelNum(piece);
          ctx.font = 'bold 13px Consolas, monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.fillText(num, x + CELL/2 + 1, y + CELL/2 + 1);
          ctx.fillStyle = '#fff';
          ctx.fillText(num, x + CELL/2, y + CELL/2);
        }
      } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 1;
        ctx.strokeRect(x+.5, y+.5, CELL, CELL);
      }
    }
  }

  if (solution) drawOutlines(ctx);
}

function drawOutlines(ctx) {
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      const cell = solution[r][c];
      if (!cell || cell === 'X') continue;
      const x = c * CELL, y = r * CELL;
      const color = lightenColor(pieceColor(pieces[cell.pieceIdx]), 50);
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      const same = (r2,c2) => {
        if (r2<0||r2>=gridRows||c2<0||c2>=gridCols) return false;
        const nb = solution[r2][c2];
        return nb && nb !== 'X' && nb.pieceIdx === cell.pieceIdx;
      };
      ctx.beginPath();
      if (!same(r-1,c)) { ctx.moveTo(x,y); ctx.lineTo(x+CELL,y); }
      if (!same(r+1,c)) { ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL); }
      if (!same(r,c-1)) { ctx.moveTo(x,y); ctx.lineTo(x,y+CELL); }
      if (!same(r,c+1)) { ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL); }
      ctx.stroke();
    }
  }
}

function shadeColor(col, amt) {
  let num = parseInt(col.slice(1), 16);
  let r = Math.max(0, Math.min(255, (num >> 16) + amt));
  let g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  let b = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6, '0');
}
function lightenColor(col, amt) { return shadeColor(col, amt); }

function clearSolution() { solution = null; drawGrid(); setStatus('',''); }
function setStatus(text, cls) {
  const el = document.getElementById('statusBar');
  el.textContent = text; el.className = cls;
}

// ═══════════════════════════════════════════════════════════
// Piece management
// ═══════════════════════════════════════════════════════════
function addPiece(type) {
  if (type === 'blue' && mode === 'green') return;
  const colorIdx = type === 'green' ? greenCount++ : blueCount++;
  const piece = { id: pieceSerial++, type, colorIdx, cells: new Set() };
  pieces.push(piece);
  renderPieceCard(piece);
}

function removePiece() {
  if (!pieces.length) return;
  const removed = pieces.pop();
  if (removed.type === 'green') greenCount = Math.max(0, greenCount-1);
  else blueCount = Math.max(0, blueCount-1);
  const list = document.getElementById('pieceList');
  if (list.lastChild) list.removeChild(list.lastChild);
}

function renderPieceCard(piece) {
  const color = pieceColor(piece);
  const num = piece.colorIdx + 1;
  const label = piece.type === 'green' ? `🟢 绿色原件 ${num}` : `🔵 蓝色原件 ${num}`;

  const card = document.createElement('div');
  card.className = 'piece-card';
  card.style.borderColor = color;

  const name = document.createElement('div');
  name.className = 'piece-name';
  name.textContent = label;
  name.style.color = color;
  card.appendChild(name);

  const canvas = document.createElement('canvas');
  canvas.className = 'piece-canvas';
  canvas.width = PIECE_GRID * PCELL + 1;
  canvas.height = PIECE_GRID * PCELL + 1;
  card.appendChild(canvas);

  const btn = document.createElement('button');
  btn.textContent = '清空';
  btn.onclick = () => { piece.cells.clear(); drawPieceCanvas(canvas, piece); };
  card.appendChild(btn);

  // Mouse
  let isDrawing = false;
  canvas.addEventListener('mousedown', e => { isDrawing = true; togglePieceCell(e.clientX, e.clientY, canvas, piece); });
  canvas.addEventListener('mousemove', e => { if (isDrawing) togglePieceCell(e.clientX, e.clientY, canvas, piece, true); });
  canvas.addEventListener('mouseup', () => { isDrawing = false; });
  canvas.addEventListener('mouseleave', () => { isDrawing = false; });
  // Touch
  canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; togglePieceCell(e.touches[0].clientX, e.touches[0].clientY, canvas, piece); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) togglePieceCell(e.touches[0].clientX, e.touches[0].clientY, canvas, piece, true); }, {passive:false});
  canvas.addEventListener('touchend', () => { isDrawing = false; });

  drawPieceCanvas(canvas, piece);
  document.getElementById('pieceList').appendChild(card);
}

function togglePieceCell(clientX, clientY, canvas, piece, drag = false) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const c = Math.floor((clientX - rect.left) * scaleX / PCELL);
  const r = Math.floor((clientY - rect.top) * scaleY / PCELL);
  if (r < 0 || r >= PIECE_GRID || c < 0 || c >= PIECE_GRID) return;
  const key = `${r},${c}`;
  if (drag) { piece.cells.add(key); }
  else { piece.cells.has(key) ? piece.cells.delete(key) : piece.cells.add(key); }
  drawPieceCanvas(canvas, piece);
}

function drawPieceCanvas(canvas, piece) {
  const ctx = canvas.getContext('2d');
  const color = pieceColor(piece);
  const num = pieceLabelNum(piece);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < PIECE_GRID; r++) {
    for (let c = 0; c < PIECE_GRID; c++) {
      const x = c * PCELL, y = r * PCELL;
      const key = `${r},${c}`;
      if (piece.cells.has(key)) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, PCELL, PCELL);
        ctx.strokeStyle = shadeColor(color, -40);
        ctx.lineWidth = 1;
        ctx.strokeRect(x+.5, y+.5, PCELL, PCELL);
        // ── Piece number ──
        ctx.font = 'bold 12px Consolas, monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillText(num, x+PCELL/2+1, y+PCELL/2+1);
        ctx.fillStyle = '#fff';
        ctx.fillText(num, x+PCELL/2, y+PCELL/2);
      } else {
        ctx.strokeStyle = '#333355';
        ctx.lineWidth = 1;
        ctx.strokeRect(x+.5, y+.5, PCELL, PCELL);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// Solve
// ═══════════════════════════════════════════════════════════
function startSolve() {
  readConstraints();
  const greenPieces = pieces.filter(p => p.type === 'green');
  const bluePieces  = pieces.filter(p => p.type === 'blue');

  for (const p of pieces) {
    if (p.cells.size === 0) {
      alert(`原件「${p.type==='green'?'绿色':'蓝色'} ${p.colorIdx+1}」没有绘制任何方块。`); return;
    }
  }
  if (!greenPieces.length) { alert('请至少添加一个绿色原件。'); return; }
  if (mode === 'dual' && !bluePieces.length) { alert('双色模式下请至少添加一个蓝色原件。'); return; }

  const rowGSum = rowConstraints.reduce((s,r)=>s+r.green,0);
  const colGSum = colConstraints.reduce((s,r)=>s+r.green,0);
  if (rowGSum !== colGSum) { alert(`绿色：行之和(${rowGSum}) ≠ 列之和(${colGSum})。`); return; }
  if (mode === 'dual') {
    const rowBSum = rowConstraints.reduce((s,r)=>s+r.blue,0);
    const colBSum = colConstraints.reduce((s,r)=>s+r.blue,0);
    if (rowBSum !== colBSum) { alert(`蓝色：行之和(${rowBSum}) ≠ 列之和(${colBSum})。`); return; }
  }

  // Count pre-placed cells
  let prePlacedGreen = 0, prePlacedBlue = 0;
  for (const [key, type] of prePlacedCells.entries()) {
    if (type === 'green') prePlacedGreen++;
    else prePlacedBlue++;
  }

  const totalGreenCells = greenPieces.reduce((s,p)=>s+p.cells.size,0) + prePlacedGreen;
  const totalGreenNeeded = rowConstraints.reduce((s,r)=>s+r.green,0);
  if (totalGreenCells !== totalGreenNeeded) {
    if (!confirm(`绿色方块总数(${totalGreenCells}) ≠ 需求(${totalGreenNeeded})。继续？`)) return;
  }
  if (mode === 'dual') {
    const totalBlueCells = bluePieces.reduce((s,p)=>s+p.cells.size,0) + prePlacedBlue;
    const totalBlueNeeded = rowConstraints.reduce((s,r)=>s+r.blue,0);
    if (totalBlueCells !== totalBlueNeeded) {
      if (!confirm(`蓝色方块总数(${totalBlueCells}) ≠ 需求(${totalBlueNeeded})。继续？`)) return;
    }
  }

  setStatus('正在求解中，请稍候…', '');
  document.getElementById('btnSolve').disabled = true;
  
  // Force reflow to ensure status is displayed before solving
  document.getElementById('statusBar').offsetHeight;
  
  setTimeout(() => {
    const result = solveAll();
    document.getElementById('btnSolve').disabled = false;
    if (result) { 
      solution = result; 
      drawGrid(); 
      setStatus('✓ 求解成功！', 'ok'); 
    } else { 
      setStatus('✗ 当前约束条件无解，请检查输入。', 'err'); 
    }
  }, 50);
}

// ═══════════════════════════════════════════════════════════
// Solver
// ═══════════════════════════════════════════════════════════
function normalize(coords) {
  const minR = Math.min(...coords.map(c=>c[0]));
  const minC = Math.min(...coords.map(c=>c[1]));
  return coords.map(([r,c])=>[r-minR,c-minC]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}
function rotate90(coords) { return normalize(coords.map(([r,c])=>[c,-r])); }
function getRotations(coords) {
  const seen = new Set(), rots = [];
  let cur = normalize(coords);
  for (let i = 0; i < 4; i++) {
    const k = JSON.stringify(cur);
    if (!seen.has(k)) { seen.add(k); rots.push(cur); }
    cur = rotate90(cur);
  }
  return rots;
}

function solveAll() {
  const rows = gridRows, cols = gridCols;
  const allPieces = pieces.map((p,idx) => ({
    idx, type: p.type,
    rotations: getRotations(Array.from(p.cells).map(k=>k.split(',').map(Number)))
  }));

  const validPlacements = allPieces.map(piece => {
    const pl = [];
    for (const rot of piece.rotations) {
      const maxR = Math.max(...rot.map(c=>c[0]));
      const maxC = Math.max(...rot.map(c=>c[1]));
      for (let ar = 0; ar+maxR < rows; ar++) {
        for (let ac = 0; ac+maxC < cols; ac++) {
          const cells = rot.map(([r,c])=>[r+ar,c+ac]);
          if (cells.some(([r,c])=>disabledCells.has(`${r},${c}`) || prePlacedCells.has(`${r},${c}`))) continue;
          pl.push(cells);
        }
      }
    }
    return pl;
  });

  // Initialize grid with disabled and pre-placed cells
  const grid = Array.from({length:rows},(_,r)=>
    Array.from({length:cols},(_,c)=>{
      if (disabledCells.has(`${r},${c}`)) return 'X';
      const pp = prePlacedCells.get(`${r},${c}`);
      if (pp) return {pieceIdx:-1, type:pp, prePlaced:true};
      return null;
    }));

  // Initialize remaining constraints, accounting for pre-placed cells
  const rowRemG = rowConstraints.map(r=>r.green);
  const rowRemB = rowConstraints.map(r=>r.blue);
  const colRemG = colConstraints.map(c=>c.green);
  const colRemB = colConstraints.map(c=>c.blue);
  
  // Subtract pre-placed cells from constraints
  for (const [key, type] of prePlacedCells.entries()) {
    const [r,c] = key.split(',').map(Number);
    if (type === 'green') {
      rowRemG[r]--;
      colRemG[c]--;
    } else {
      rowRemB[r]--;
      colRemB[c]--;
    }
  }

  function place(cells,pIdx,type) {
    for (const [r,c] of cells) {
      grid[r][c] = {pieceIdx:pIdx,type};
      if (type==='green'){rowRemG[r]--;colRemG[c]--;}
      else{rowRemB[r]--;colRemB[c]--;}
    }
  }
  function unplace(cells,type) {
    for (const [r,c] of cells) {
      grid[r][c] = null;
      if (type==='green'){rowRemG[r]++;colRemG[c]++;}
      else{rowRemB[r]++;colRemB[c]++;}
    }
  }
  function feasible() {
    return rowRemG.every(v=>v>=0)&&colRemG.every(v=>v>=0)&&
           rowRemB.every(v=>v>=0)&&colRemB.every(v=>v>=0);
  }
  function backtrack(idx) {
    if (idx===allPieces.length) {
      return rowRemG.every(v=>v===0)&&colRemG.every(v=>v===0)&&
             rowRemB.every(v=>v===0)&&colRemB.every(v=>v===0);
    }
    const piece = allPieces[idx];
    for (const cells of validPlacements[idx]) {
      if (cells.some(([r,c])=>grid[r][c]!==null)) continue;
      place(cells,idx,piece.type);
      if (feasible()&&backtrack(idx+1)) return true;
      unplace(cells,piece.type);
    }
    return false;
  }
  if (backtrack(0)) return grid;
  return null;
}
